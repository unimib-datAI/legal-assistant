version: '3.8'
services:
  neo4j:
    image: neo4j:latest
    container_name: local-neo4j
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    volumes:
      - ./data:/data
      - ./logs:/logs
      - ./config:/config
      - ./plugins:/plugins
    environment:
      - NEO4J_AUTH=neo4j/your_password
    restart: always